<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeepHermes</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace;
            background: #1a1b26; color: #a9b1d6; height: 100vh; display: flex; flex-direction: column;
        }
        #header {
            background: #24283b; padding: 12px 20px; border-bottom: 1px solid #3b4261;
            display: flex; align-items: center; justify-content: space-between;
        }
        #header h1 { font-size: 18px; color: #7dcfff; }
        #header .badge { font-size: 12px; color: #565f89; }
        #chat {
            flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px;
        }
        .message { max-width: 85%; padding: 12px 16px; border-radius: 8px; line-height: 1.5; }
        .message.user { align-self: flex-end; background: #2ac3de22; border: 1px solid #2ac3de44; }
        .message.assistant { align-self: flex-start; background: #24283b; border: 1px solid #3b4261; }
        .message.tool { align-self: flex-start; background: #1a1b26; border: 1px solid #565f89; font-size: 13px; color: #565f89; }
        pre { background: #1a1b26; padding: 8px 12px; border-radius: 4px; overflow-x: auto; font-size: 13px; }
        code { font-family: 'Fira Code', 'Cascadia Code', monospace; font-size: 13px; }
        #input-area { padding: 16px 20px; border-top: 1px solid #3b4261; background: #24283b; display: flex; gap: 10px; }
        #user-input { flex: 1; background: #1a1b26; border: 1px solid #3b4261; color: #c0caf5; padding: 12px; border-radius: 8px; font-family: monospace; font-size: 14px; resize: none; min-height: 44px; max-height: 200px; }
        #user-input:focus { outline: none; border-color: #7dcfff; }
        button { background: #7dcfff; color: #1a1b26; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 14px; }
        button:hover { background: #2ac3de; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .thinking { display: flex; align-items: center; gap: 8px; color: #565f89; font-size: 13px; padding: 8px 16px; }
        .thinking .dot { width: 6px; height: 6px; background: #565f89; border-radius: 50%; animation: bounce 1.4s infinite ease-in-out both; }
        .thinking .dot:nth-child(1) { animation-delay: -0.32s; }
        .thinking .dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
    </style>
</head>
<body>
    <div id="header">
        <h1>DeepHermes</h1>
        <span class="badge">Powered by DeepSeek</span>
    </div>
    <div id="chat" hx-ext="sse">
        <!-- Messages appear here -->
    </div>
    <div id="input-area">
        <textarea id="user-input" placeholder="Type your message..." rows="1" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}"></textarea>
        <button onclick="sendMessage()">Send</button>
    </div>

    <script>
        async function sendMessage() {
            const input = document.getElementById('user-input');
            const text = input.value.trim();
            if (!text) return;

            const chat = document.getElementById('chat');

            // Add user message
            const userMsg = document.createElement('div');
            userMsg.className = 'message user';
            userMsg.textContent = text;
            chat.appendChild(userMsg);

            // Add thinking indicator
            const thinking = document.createElement('div');
            thinking.className = 'thinking';
            thinking.id = 'thinking';
            thinking.innerHTML = 'Thinking <span class="dot"></span><span class="dot"></span><span class="dot"></span>';
            chat.appendChild(thinking);

            input.value = '';
            chat.scrollTop = chat.scrollHeight;

            try {
                const resp = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                });

                // Remove thinking
                thinking.remove();

                const reader = resp.body.getReader();
                const decoder = new TextDecoder();
                const assistantMsg = document.createElement('div');
                assistantMsg.className = 'message assistant';
                chat.appendChild(assistantMsg);

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    const chunk = decoder.decode(value, { stream: true });
                    assistantMsg.textContent += chunk;
                    chat.scrollTop = chat.scrollHeight;
                }
            } catch (err) {
                thinking.remove();
                const errMsg = document.createElement('div');
                errMsg.className = 'message tool';
                errMsg.textContent = 'Error: ' + err.message;
                chat.appendChild(errMsg);
            }
        }
    </script>
</body>
</html>
